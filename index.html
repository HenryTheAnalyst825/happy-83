<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu khảo sát</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --secondary-pink: #ffc3a0;
            --text-color: #5d4037;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background: linear-gradient(135deg, var(--primary-pink), var(--secondary-pink)); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            color: var(--text-color);
        }

        .card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 400px; 
            text-align: center; 
            border: 2px solid #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        h2 { color: #d81b60; margin-bottom: 10px; font-size: 1.6rem; }
        .hidden { display: none; }
        
        .question { text-align: left; margin: 15px 0 5px 0; font-weight: 600; font-size: 0.95rem; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 5px 0 15px 0; 
            border: 2px solid #ffebee; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-family: inherit;
            outline: none;
        }

        input:focus, select:focus, textarea:focus { border-color: var(--primary-pink); }

        button { 
            background: #ff4081; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); background: #f50057; }

        /* Khung chứa Voice & Quà */
        #reveal-section {
            animation: fadeIn 1.5s;
        }

        .audio-player {
            margin: 20px 0;
            background: #fff5f8;
            padding: 15px;
            border-radius: 20px;
            border: 1px dashed #ff4081;
        }

        #flower-img {
            max-width: 180px;
            border-radius: 20px;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart-icon { font-size: 3rem; color: #ff4081; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="step1" class="card">
    <div class="heart-icon">💖</div>
    <h2>Làm quen tí nè</h2>
    <p style="font-size: 0.9rem; color: #888;">Điền giúp em xíu thông tin nhó!</p>
    
    <div class="question">Họ và tên:</div>
    <input type="text" id="fullname" placeholder="Tên ở nhà cũng được á...">
    
    <div class="question">Ngày sinh nhật:</div>
    <input type="date" id="dob">
    
    <div class="question">Status?</div>
    <select id="likeVoice">
        <option value="Độc thân">Độc thân</option>
        <option value="Single">Single (nhưng bằng tiếng Anh)</option>
    </select>
    
    <button onclick="nextStep(1)">Tiếp tục nè ✨</button>
</div>

<div id="step2" class="card hidden">
    <h2>Sở thích của chị 🎈</h2>
    
    <div class="question">Chị thích ăn món gì nhất?</div>
    <input type="text" id="food" placeholder="Trà sữa, kem, hay là... đi ăn với em?">
    
    <div class="question">Chị thích làm gì khi rảnh?</div>
    <textarea id="hobby" rows="3" placeholder="Nghe nhạc, xem phim hay đi dạo..."></textarea>
    
    <button onclick="nextStep(2)">Gửi cho em nhé</button>
</div>

<div id="step3" class="card hidden">
    <div id="reveal-section">
        <h2>Tặng chị nè! 🎁</h2>
        <p id="thankyou-msg"></p>
        
        <img id="flower-img" src="https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUycG1tbmkwdXlpbzN3amFwM3YyZ21scGhqenlkamwxY2wzZXRrNjI5NSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/KztT2c4u8mYYUiMKdJ/giphy.gif" alt="Cute gif">


        <p style="font-size: 0.9rem; font-style: italic;">"Cảm ơn chị nhiều nhaa!"</p>
    </div>
</div>

<script>
    function nextStep(current) {
        if (current === 1) {
            const name = document.getElementById('fullname').value;
            if (!name) { alert("Chị chưa nhập tên kìa!"); return; }
            
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        } else if (current === 2) {
            event.target.innerText = "Đang gửi... ";
            event.target.disabled = true;

            const data = {
                "Họ và tên": document.getElementById('fullname').value,
                "Ngày sinh": document.getElementById('dob').value,
                "Món ăn thích": document.getElementById('food').value,
                "Sở thích": document.getElementById('hobby').value,
                "Status": document.getElementById('likeVoice').value
            };

            const formspreeLink = "https://formspree.io/f/xaqvbrzr"; 

            fetch(formspreeLink, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                const name = document.getElementById('fullname').value;
                document.getElementById('thankyou-msg').innerText = "Hiếu đã cất giữ cẩn thận câu trả lời của " + name + " rồi nha!";
                
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            })
            .catch(error => {
                alert("Úi, có lỗi xíu rồi. Chị thử lại nha!");
                event.target.innerText = "Cám mơn nhó";
                event.target.disabled = false;
            });
        }
    }
</script>
</body>
</html>
